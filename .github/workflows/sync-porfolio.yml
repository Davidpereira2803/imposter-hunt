name: Sync portfolio metadata

on:
  push:
    branches: [ master ]
    paths:
      - "portfolio/project.json"

jobs:
  notify-portfolio:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate JSON
        run: |
          jq empty portfolio/project.json

      - name: Read metadata
        id: metadata
        run: |
          echo "json<<EOF" >> $GITHUB_OUTPUT
          cat portfolio/project.json >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Dispatch to portfolio repo
        env:
          PORTFOLIO_REPO_TOKEN: ${{ secrets.PORTFOLIO_REPO_TOKEN }}
        run: |
          curl -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $PORTFOLIO_REPO_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/Davidpereira2803/YOUR_PORTFOLIO_REPO/dispatches \
            -d @- <<EOF
          {
            "event_type": "project_metadata_updated",
            "client_payload": {
              "source_repo": "${{ github.repository }}",
              "source_sha": "${{ github.sha }}",
              "project": ${{ steps.metadata.outputs.json }}
            }
          }
          EOF